amcl:
  ros__parameters:
    # Motion model
    robot_model_type: nav2_amcl::DifferentialMotionModel
    alpha1: 0.2   # rotation noise from rotation
    alpha2: 0.2   # rotation noise from translation
    alpha3: 0.2   # translation noise from translation
    alpha4: 0.2   # translation noise from rotation
    alpha5: 0.2   # strafe noise (unused for diff drive)

    # Particle filter
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    # Laser model
    laser_model_type: likelihood_field
    laser_max_range: 12.0
    laser_min_range: 0.1
    max_beams: 60
    z_hit: 0.5
    z_rand: 0.5
    sigma_hit: 0.2
    laser_likelihood_max_dist: 2.0

    # Frames — must match sensor_robot URDF
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: /scan

    # Update thresholds
    update_min_d: 0.2       # minimum translation before update (m)
    update_min_a: 0.5       # minimum rotation before update (rad)

    # Initial pose (overridden at launch with random spawn coords)
    initial_pose:
      x: 0.0
      y: 0.0
      yaw: 0.0

    set_initial_pose: true
    always_reset_initial_pose: false

    tf_broadcast: true
    transform_tolerance: 1.0
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0

map_server:
  ros__parameters:
    yaml_filename: ""   # set via launch argument
    topic_name: map
    frame_id: map
